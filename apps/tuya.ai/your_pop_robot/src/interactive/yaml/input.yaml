# input 参数
# 修改本文件后，重新编译即可生效

microphone:
  # 字段: min_frames_1s, min_rms_permille
  min_frames_1s: 1
  min_rms_permille: 10

touch:
  # 字段: min_active_channels, event_window_ms, min_events_in_window
  min_active_channels: 1
  event_window_ms: 1000
  min_events_in_window: 2

imu:
  # 字段: require_calibrated, accel_norm_min_mps2, accel_norm_max_mps2, motion_accel_delta_min_mps2, motion_gyro_axis_min_dps, motion_min_consecutive_hits
  require_calibrated: false
  accel_norm_min_mps2: 8.0
  accel_norm_max_mps2: 12.0
  motion_accel_delta_min_mps2: 3.5
  motion_gyro_axis_min_dps: 220.0
  motion_min_consecutive_hits: 2
